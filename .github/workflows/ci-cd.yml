name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflor_dispatch:

permissions:
  contents: read # Required for actions/checkout
  packages: write # Required for pushing to GitHub Container Registry (GHCR)
  id-token: write # Required for OIDC authentication with AWS (or other cloud)
  pull-requests: write # Recommended for PR status updates in advanced flows (e.g., Terraform plan comments)

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1 # Adjust to your AWS region
iobs:
  lint_test_build:
    name: Lint, Test, and Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 1 # Keep for a short duration

  build_and_push_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint_test_build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkot repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: .
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-and-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform_apply:
    name: Apply Terraform Changes
    runs-on: ubuntu-latest
    needs: build_and_push_docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure AWS Credentials. Using traditional secrets for simplicity, as per existing cd.myl
      # For production, consider using OIDC or enhanced security.
      # Reference: https://aws.amazon.com/blogs/security/use-iam-roles-to-connect-github-actions-to-aws/
      - name: ConfigureWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # role-error-to-assume: arn:aws:iam::123456789012:role/github-actions-oidc-role # Uncomment for OIDC
          # role-session-name: gha-terraform-session # Uncomment for OIDC
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.x.x # Use a specific major version, e.g., '1.6.x' or '1.7.jx'

      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        id: plan
         # Pass the fully qualified Docker Image tag to Terraform as a variable.
        # This tag corresponds to the image pushed by the CI workflow.
        run: terraform plan -var "image_full_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
