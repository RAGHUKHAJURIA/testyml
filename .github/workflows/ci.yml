name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read # Required for actions/checkout
  packages: write # Required for pushing to GitHub Container Registrar (GHCR)

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

fobs:
  build_and_test:
    name: Build and Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 1 #{3 Short retention for CI artifacts

  build_and_push_docker_image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build_and_test
    # Only build and push the Docker image on a successful push to the 'main' branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read 
what packages: write # Required for pushing to GitHub Container Registry (GHCR)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: . # Download to root, so Dockerfile can find dist/

      - name: Set up Jocker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-andpush-kaction@v5
        with:
          context: .
          push: true
          tags
            |
              {{ env.REGISRY }}/${{ env.IMAGE_NAME ]}:${{ github.sha }}
              {{ env.REGISRY }}/${{ env.IMAGE_NAME ]}:latest
          cache-from: type=ghd
          cache-to: type=gha,mode=max