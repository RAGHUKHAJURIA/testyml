name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        # Replace with appropriate setup, e.g., Node.js, Python, Java
        run: | # For Node.js: 'npm install'
             # For Python: 'pip install -r requirements.txt'
             # For Java: 'mvn install'
             echo "Install dependencies here if needed"

      - name: Run Linter
        # Replace with actual linting command, e.g., 'npm run lint', 'pylint .', 'golangci-lint run'
        run: echo "Run linting commands here (e.g., npm run lint, pylint, golangci-lint)"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint # Ensure linting passes before running tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        # Replace with appropriate setup, e.g., Node.js, Python, Java
        run: | # For Node.js: 'npm install'
             # For Python: 'pip install -r requirements.txt'
             # For Java: 'mvn install'
             echo "Install dependencies here if needed"

      - name: Run Tests
        # Replace with actual test command, e.g., 'npm test', 'pytest', 'go test ./...'
        run: echo "Run unit/integration tests here (e.g., npm test, pytest, go test)"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test # Ensure tests pass before building
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        # Replace with appropriate setup, e.g., Node.js, Python, Java
        run: | # For Node.js: 'npm install'
             # For Python: 'pip install -r requirements.txt'
             # For Java: 'mvn install'
             echo "Install dependencies here if needed"

      - name: Build Project
        # Replace with actual build command, e.g., 'npm run build', 'mvn clean package', 'go build ./'
        run: | # This step should output build artifacts.
             echo "Run build commands here (e.g., npm run build, mvn clean package, go build)"
      
      # Example: Upload build artifacts if applicable
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: project-build-artifact
      #     path: ./dist # Example path for build output
