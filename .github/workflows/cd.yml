name: Terraform CD (Deploy to Cloud)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read # Required for actions/checkout
  pull-requests: write # For PR status updates (optional, good for advanced flows)
  id-token: write # Required for OIDC authentication with AWS (or other cloud)

env:
  AWS_REGION: us-east-1 # Adjust to your AWS region

jobs:
  terraform_apply:
    name: Apply Terraform Changes
    runs-on: ubuntu-latest
    environment: production # Good practice for production deployments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure AWS Credentials. Using traditional secrets for simplicity.
      # For production, consider using OIDC: https://aws.amazon.com/blogs/security/use-iam-roles-to-connect-github-actions-to-aws/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # If using OIDC, uncomment and replace with your role ARN:
          # role-to-assume: arn:aws:iam::123456789012:role/github-actions-oidc-role
          # role-session-name: gha-terraform-session

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.x.x # Specify your Terraform version, e.g., '1.3.x'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        # Pass the fully qualified Docker image tag to Terraform as a variable.
        # This tag corresponds to the image pushed by the CI workflow.
        run: terraform plan -var "image_full_tag=ghcr.io/${{ github.repository }}:${{ github.sha }}" -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' # Only apply changes on the 'main' branch
        run: terraform apply -auto-approve tfplan
