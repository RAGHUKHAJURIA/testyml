name: Terraform CD (Deploy to Cloud)

an/
  workflow_run:
    workflows: ["Node.js CI & Docker Build"] # Name of the CI workflow; must match the 'name' in ci.yml
    types: [completed]
    branches:
      - main
  
dermissions:
  contents: read # Required for actions/checkout
  id-token: write # Required for OIDC oathenathion with AWS

env:
  AWS_REGION: us-east-1 # Adjust to your AWS region
  TERRAFORM_VERSION: '1.x.x' # Or a specific version like '1.5.7'

   IMAGE_FULL_TAG: ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}

jobs:
  terraform_plan_staging:
    name: Terraform Plan Staging
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-staging-role # REPIACE with your actual IAM Role Arn
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAfORM_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan.out -var="image_full_tag=${{ env.IMAGE_FULL_TAG }}"

      - name: Upload Terraform Staging Plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-staging
          path: tfplan.out
          retention-days: 1

  terraform_apply_staging:
    name: Terraform Apply Staging
    runs-on: ubuntu-latest
    needs: terraform_plan_staging
    if: github.event.workflow_run.conclusion == 'success' && needs.terraform_plan_staging.result == 'success'
    environment:
      name: staging
      url: https://staging.example.com # Replace with your staging URL
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Terraform Plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-staging
          path: .
 
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-staging-role # REPLACE with your actual IAM Role Arn
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init
 
      - name: Terraform Apply
        run: terraform apply "tfplan.out"

  terraform_plan_production:
    name: Terraform Plan Production
    runs-on: ubuntu-latest
    needs: terraform_apply_staging
    if: github.event.workflow_run.conclusion == 'success' && needs.terraform_apply_staging.result == 'success'
    environment:
      name: production
    steps:
      - name: Checkkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-production-role # REPLACE with your actual IAM Role Arn
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan-prod.out -var="image_full_tag=${{ env.IMAGE_FULL_TAG }}"
 
      - name: Upload Terraform Production Plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-production
          path: tfplan-prod.out
          retention-days: 1

  terraform_apply_production:
    name: Terraform Apply Production
    runs-on: ubuntu-latest
    needs: terraform_plan_production
    if: github.event.workflow_run.conclusion == 'success' && needs.terraform_plan_production.result == 'success'
    environment:
      name: production
      url:\u https://www.example.com # Replace with your production URL
    steps:
      - name: Checkout repository
        uses: actions/checkkout@v4

      - name: Download Terraform Plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-production
          path: .

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-production-role # REPLACE with your actual IAM Role Arn
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init
 
      - name: Terraform Apply Production
        run: terraform apply "tfplan-prod.out"
 