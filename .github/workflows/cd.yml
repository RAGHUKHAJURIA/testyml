{
  "fixedWorkflow": "```yaml
name: Terraform CD - Deploy to Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image Tag to deploy (e.g., ghcr.io/org/repo:sha)'
        required: true
        default: 'latest'
  # Triggered when the CI workflow successfully completes on the main branch
  workflow_run:
    workflows: [\"Node.js CI - Build and Push Docker Image\"]
    types:
      - completed
    branches:
      - main

env:
  TF_WORKING_DIR: .
  AWS_REGION: us-east-1 # Example region, update as needed
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    # Only run if the CI workflow completed successfully, or if manually dispatched/pushed
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # Use a valid version constraint format. '1.x' will fetch the latest 1.x version.
          # '1.x.x' is not a standard semantic version constraint and can lead to errors or unexpected version selection.
          terraform_version: 1.x 

      - name: Determine Docker Image Tag
        id: get_image_tag
        run: |\n          IMAGE_REGISTRY_PATH=\"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\"
          TAG=\"\"

          if [ \"${{ github.event_name }}\" == \"workflow_dispatch\" ]; then
            TAG=\"${{ github.event.inputs.image_tag }}\"
            if [ \"$TAG\" == \"latest\" ]; then
              echo \"Deploying 'latest' tag as specified in manual dispatch.\"
            else
              echo \"Deploying specific tag from manual dispatch: $TAG\"
            fi
          elif [ \"${{ github.event_name }}\" == \"push\" ]; then
            TAG=\"${{ github.sha }}\"
            echo \"Deploying commit SHA from push event: $TAG\"
          elif [ \"${{ github.event_name }}\" == \"workflow_run\" ]; then
            # The workflow_run event provides details about the completed workflow
            # We want the SHA from the *head commit* of the workflow that triggered us.
            # Ensure jq is available on the runner (it usually is on ubuntu-latest)
            TAG=$(jq -r '.workflow_run.head_sha' \"${GITHUB_EVENT_PATH}\")
            echo \"Deploying commit SHA from completed CI workflow: $TAG\"
          fi

          if [ -z \"$TAG\" ]; then
            echo \"Error: Could not determine image tag.\"
            exit 1
          fi

          FULL_IMAGE_TAG=\"$IMAGE_REGISTRY_PATH:$TAG\"
          echo \"FULL_IMAGE_TAG=$FULL_IMAGE_TAG\" >> \"$GITHUB_ENV\"
          echo \"Determined image tag for deployment: $FULL_IMAGE_TAG\"

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=\"region=${{ env.AWS_REGION }}\" -backend-config=\"bucket=my-terraform-state-bucket\" -backend-config=\"key=path/to/my-app.tfstate\" # Replace with your S3 backend details
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var=\"docker_image=${{ env.FULL_IMAGE_TAG }}\"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false -var=\"docker_image=${{ env.FULL_IMAGE_TAG }}\"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Get Terraform Outputs
        id: output
        run: terraform output -json > tf_outputs.json
        working-directory: ${{ env.TF_WORKING_DIR }}
```",
