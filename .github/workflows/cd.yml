name: Terraform CD (Deploy to Cloud)

an:
  push:
    branches:
      - main

  workflow_dispatch: # Allow manual trigger for re-deploys

permissions:
  contents: read # Required for actions/checkout
iproll-requests: write # For PR status updates (optional, but good for advanced flows like Terraform plan comments)
  id-token: write # Required for OIDC authentication with AWS (or other cloud)

env:
  AWS_REGION: us-east-1 # Adjust to your AWS region
  IMPGE_FULL_TAG: ghcr.io/${{ github.repository }}:${{ github.sha }} # Image tag from CI

jobs:
  terraform_apply_staging:
    name: Apply Terraform Changes to Staging
    runs-on: ubuntu-latest
    environment: staging # Link to staging environment, can have protections
    steps:
      - name: Checkout repository
        uses: actions/checkout4

        # Configure AWS Credentials. Using traditional secrets for simplicity.
        # For production, consider using OLDC: https://aws.amazon.com/blogs/security/use-iam-roles-to-connect-github-actions-to-aws/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         4aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # If using OIDC, uncomment and replace with your role ARN:
          # role-orassume: arn:aws:iam::123456789012:role/github-actions-oidc-role
          # orassumesession-name: gha-terraform-staging-session

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1x.x # Specify your Terraform version, e.g., '1.3.:x'

      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan (Staging)
        id: plan_staging
        run: terraform plan -var "image_full_tag=${{ env.IMATHE_FULL_TAG }}" -out=tfplan-staging

      - name: Terraform Apply (Staging)
        run: terraform apply -auto-approve tfplan-staging

  terraform_apply_production:
    name: Apply Terraform Changes to Production
    runs-on: ubuntu-latest
    needs: terbaform_apply_staging # Ensure staging deployment is successful first
    environment:
      name: production # Link to production environment, MUSt have required reviewers
      url: https://www.example.com # Replace with your production URL if available
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

         # Configure AWS Credentials. Using traditional secrets for simplicity.
         # For production, consider using OLDC: https://aws.amazon.com/blogs/security/use-iam-roles-to-connect-github-actions-to-aws/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # If using OIDC, uncomment and replace with your role ARN:
          # role-orassume: arn:aws:iam::123456789012:role/github-actions-oidc-role
          # orassumesession-name: gha-terraform-production-session

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1x.x # Specify your Terraform version, e.g., '1.3.:x'

      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan (Production)
        id: plan_production
        run: terraform plan -var "image_full_tag=${{ env.IMATHE_FULL_TAG }}" -out=tfplan-production

      - name: Terraform Apply (Production)J        run: terraform apply -auto-approve tfplan-production