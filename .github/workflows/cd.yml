name: CD - Deploy with Terraform

on:
  workflow_run:
    workflows: ["CI - Build, Test & Push Docker"] # Name of the CI workflow
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    # Only run if the triggering CI workflow was successful
    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Needed for AWS OIDC authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Checkout the head_sha of the workflow_run that triggered this CD,
        # to ensure we have the correct Terraform files for that specific commit.
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }} # e.g., arn:aws:iam::123456789012:role/github-actions-deploy-role
          aws-region: ${{ secrets.AWS_REGION }} # e.g., us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.x.x # Specify your desired Terraform version (e.g., '1.4.6')

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        # Pass the Docker image tag as a Terraform variable.
        # The image tag is derived from the SHA of the commit that triggered the CI workflow.
        run: terraform plan -out=tfplan -var "image_tag=ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}"

      - name: Terraform Apply
        id: apply
        # Apply only if the workflow is on the main branch and the plan was successful.
        if: github.ref == 'refs/heads/main' && github.event.workflow_run.conclusion == 'success'
        run: terraform apply -auto-approve tfplan
