name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.example.com # Replace with your staging URL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging Environment
        run: |
          echo "Initiating deployment to staging..."
          # IMPORTANT: Replace the 'echo' and 'true' commands below with your actual deployment logic for staging.
          # These commands must correctly deploy your application and exit with a non-zero status code on failure.
          # GitHub Actions automatically fails a step if a 'run' command exits with a non-zero status code.
          #
          # Example for AWS S3:
          #   aws s3 sync ./build s3://staging-bucket --delete
          # Example for Kubernetes:
          #   kubectl apply -f k8s/staging.yaml --record
          # Example for Docker:
          #   docker build -t my-app:staging .
          #   docker push my-registry/my-app:staging
          #   kubectl set image deployment/my-app my-app=my-registry/my-app:staging -n my-namespace
          
          # Placeholder for actual deployment command.
          # The 'true' command below always succeeds. Replace it with your real deployment command.
          true
          
          echo "Successfully deployed to staging!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging # Ensure staging deployment is successful first
    environment:
      name: production
      url: https://www.example.com # Replace with your production URL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production Environment
        run: |
          echo "Initiating deployment to production..."
          # IMPORTANT: Replace the 'echo' and 'true' commands below with your actual deployment logic for production.
          # These commands must correctly deploy your application and exit with a non-zero status code on failure.
          # GitHub Actions automatically fails a step if a 'run' command exits with a non-zero status code.
          #
          # Example for AWS S3:
          #   aws s3 sync ./build s3://production-bucket --delete
          # Example for Kubernetes:
          #   kubectl apply -f k8s/production.yaml --record
          # Example for Docker:
          #   docker build -t my-app:production .
          #   docker push my-registry/my-app:production
          #   kubectl set image deployment/my-app my-app=my-registry/my-app:production -n my-namespace
          
          # Placeholder for actual deployment command.
          # The 'true' command below always succeeds. Replace it with your real deployment command.
          true
          
          echo "Successfully deployed to production!"